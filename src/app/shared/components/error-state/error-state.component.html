<div class="error-state" role="alert">
  <div class="error-state__icon-wrap" aria-hidden="true">
    <span class="material-symbols-outlined error-state__icon">error_outline</span>
  </div>

  <h2 class="error-state__title">{{ title() }}</h2>
  <p class="error-state__message">{{ message() }}</p>

  <button type="button" class="error-state__retry" (click)="retry.emit()">
    <span class="material-symbols-outlined">refresh</span>
    {{ retryLabel() }}
  </button>
</div>
