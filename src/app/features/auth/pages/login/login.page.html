<section class="login-page">
  <div class="login-page__card">
    <header class="login-page__header">
      <h1 class="login-page__title">Sign in</h1>
      <p class="login-page__subtitle">Access your blog management account.</p>
    </header>

    @if (error()) {
      <p class="login-page__error" role="alert">{{ error() }}</p>
    }

    <form class="login-page__form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="login-page__field">
        <label class="login-page__label" for="login-email">Email</label>
        <input
          id="login-email"
          class="login-page__control"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="admin@blog.com"
        />
      </div>

      <div class="login-page__field">
        <label class="login-page__label" for="login-password">Password</label>
        <input
          id="login-password"
          class="login-page__control"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Your password"
        />
      </div>

      <button class="login-page__submit" type="submit" [disabled]="loading()">
        @if (loading()) {
          Signing in...
        } @else {
          Sign in
        }
      </button>
    </form>

    <p class="login-page__hint">
      Demo: <strong>admin@blog.com</strong> / admin123 or <strong>user@blog.com</strong> / user123
    </p>
  </div>
</section>
