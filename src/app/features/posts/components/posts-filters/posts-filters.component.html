<div class="posts-filters">
  @let selectedViewMode = viewMode();

  <div class="posts-filters__search">
    <span class="posts-filters__search-leading" aria-hidden="true">
      @if (filtering()) {
        <mat-progress-spinner
          class="posts-filters__search-spinner"
          mode="indeterminate"
          diameter="18"
        />
      } @else {
        <span class="material-symbols-outlined posts-filters__search-icon">search</span>
      }
    </span>
    <input
      class="posts-filters__search-input"
      type="search"
      placeholder="Search posts..."
      [formControl]="searchControl"
      aria-label="Search posts by title"
    />
  </div>

  <div class="posts-filters__sort">
    <span class="posts-filters__sort-label">Sort by:</span>
    <div class="posts-filters__sort-control">
      <select
        class="posts-filters__sort-select"
        [formControl]="sortControl"
        aria-label="Sort posts by date"
      >
        <option value="desc">Newest first</option>
        <option value="asc">Oldest first</option>
      </select>
      <span class="material-symbols-outlined posts-filters__sort-icon" aria-hidden="true">
        expand_more
      </span>
    </div>
  </div>

  <div
    class="posts-filters__view-mode"
    role="group"
    aria-label="Posts list display mode"
  >
    <span class="posts-filters__view-mode-label">View:</span>
    <div class="posts-filters__view-mode-options">
      <button
        type="button"
        class="posts-filters__view-mode-option"
        [class.posts-filters__view-mode-option--active]="selectedViewMode === 'pagination'"
        [attr.aria-pressed]="selectedViewMode === 'pagination'"
        (click)="selectViewMode('pagination')"
      >
        <span class="material-symbols-outlined posts-filters__view-mode-icon" aria-hidden="true">
          view_list
        </span>
        Pages
      </button>
      <button
        type="button"
        class="posts-filters__view-mode-option"
        [class.posts-filters__view-mode-option--active]="selectedViewMode === 'infinite-scroll'"
        [attr.aria-pressed]="selectedViewMode === 'infinite-scroll'"
        (click)="selectViewMode('infinite-scroll')"
      >
        <span class="material-symbols-outlined posts-filters__view-mode-icon" aria-hidden="true">
          unfold_more
        </span>
        Infinite scroll
      </button>
    </div>
  </div>
</div>
