<div class="delete-post-dialog" role="dialog" aria-labelledby="delete-post-dialog-title">
  <div class="delete-post-dialog__icon-wrap" aria-hidden="true">
    <span class="material-symbols-outlined delete-post-dialog__icon">delete_forever</span>
  </div>

  <h2 id="delete-post-dialog-title" class="delete-post-dialog__title">Delete post?</h2>

  <p class="delete-post-dialog__message">
    Are you sure you want to delete
    <span class="delete-post-dialog__post-title">{{ data.postTitle }}</span
    >? This action cannot be undone.
  </p>

  @if (store.error()) {
    <p class="delete-post-dialog__error" role="alert">{{ store.error() }}</p>
  }

  <div class="delete-post-dialog__actions">
    <button
      mat-stroked-button
      type="button"
      mat-dialog-close
      [disabled]="store.deleting()"
    >
      Cancel
    </button>
    <button
      mat-flat-button
      color="warn"
      type="button"
      class="delete-post-dialog__confirm"
      [disabled]="store.deleting()"
      (click)="confirm()"
    >
      @if (store.deleting()) {
        <mat-progress-spinner
          class="delete-post-dialog__spinner"
          mode="indeterminate"
          diameter="18"
        />
        Deleting...
      } @else {
        Delete
      }
    </button>
  </div>
</div>
