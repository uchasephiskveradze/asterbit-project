<app-modal
  titleKey="posts.deleteDialog.title"
  [closeOnBackdrop]="!store.deleting()"
  (closed)="onModalCloseAttempt()"
>
  @let isDeleting = store.deleting();

  <div class="delete-post-dialog__icon-wrap" aria-hidden="true">
    <span class="material-symbols-outlined delete-post-dialog__icon">delete_forever</span>
  </div>

  <p
    class="delete-post-dialog__message"
    [innerHTML]="'posts.deleteDialog.message' | translate: { title: postTitle() }"
  ></p>

  @if (store.error()) {
    <p class="delete-post-dialog__error" role="alert">{{ store.error() | translate }}</p>
  }

  <div modalActions>
    <button
      mat-stroked-button
      type="button"
      [disabled]="isDeleting"
      (click)="onModalCloseAttempt()"
    >
      {{ 'common.cancel' | translate }}
    </button>
    <button
      mat-flat-button
      color="warn"
      type="button"
      class="delete-post-dialog__confirm"
      [disabled]="isDeleting"
      (click)="confirm()"
    >
      @if (isDeleting) {
        <mat-progress-spinner
          class="delete-post-dialog__spinner"
          mode="indeterminate"
          diameter="18"
        />
        {{ 'posts.deleteDialog.deleting' | translate }}
      } @else {
        {{ 'posts.deleteDialog.confirm' | translate }}
      }
    </button>
  </div>
</app-modal>
