<div class="delete-post-dialog" role="dialog" aria-labelledby="delete-post-dialog-title">
  @let isDeleting = store.deleting();

  <div class="delete-post-dialog__icon-wrap" aria-hidden="true">
    <span class="material-symbols-outlined delete-post-dialog__icon">delete_forever</span>
  </div>

  <h2 id="delete-post-dialog-title" class="delete-post-dialog__title">
    {{ 'posts.deleteDialog.title' | translate }}
  </h2>

  <p
    class="delete-post-dialog__message"
    [innerHTML]="'posts.deleteDialog.message' | translate: { title: data.postTitle }"
  ></p>

  @if (store.error()) {
    <p class="delete-post-dialog__error" role="alert">{{ store.error() | translate }}</p>
  }

  <div class="delete-post-dialog__actions">
    <button
      mat-stroked-button
      type="button"
      mat-dialog-close
      [disabled]="isDeleting"
    >
      {{ 'common.cancel' | translate }}
    </button>
    <button
      mat-flat-button
      color="warn"
      type="button"
      class="delete-post-dialog__confirm"
      [disabled]="isDeleting"
      (click)="confirm()"
    >
      @if (isDeleting) {
        <mat-progress-spinner
          class="delete-post-dialog__spinner"
          mode="indeterminate"
          diameter="18"
        />
        {{ 'posts.deleteDialog.deleting' | translate }}
      } @else {
        {{ 'posts.deleteDialog.confirm' | translate }}
      }
    </button>
  </div>
</div>
