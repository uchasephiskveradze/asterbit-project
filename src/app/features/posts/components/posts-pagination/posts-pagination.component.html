<div class="posts-pagination">
  <span class="posts-pagination__summary">
    Showing {{ rangeStart() }} to {{ rangeEnd() }} of {{ totalItems() }} posts
  </span>

  <div class="posts-pagination__controls">
    <button
      type="button"
      class="posts-pagination__nav"
      [disabled]="currentPage() <= 1"
      (click)="pageChange.emit(currentPage() - 1)"
      aria-label="Previous page"
    >
      <span class="material-symbols-outlined">chevron_left</span>
    </button>

    @for (page of visiblePages(); track page) {
      @if (page === 'ellipsis') {
        <span class="posts-pagination__ellipsis">...</span>
      } @else {
        <button
          type="button"
          class="posts-pagination__page"
          [class.posts-pagination__page--active]="page === currentPage()"
          (click)="pageChange.emit(page)"
        >
          {{ page }}
        </button>
      }
    }

    <button
      type="button"
      class="posts-pagination__nav"
      [disabled]="currentPage() >= totalPages()"
      (click)="pageChange.emit(currentPage() + 1)"
      aria-label="Next page"
    >
      <span class="material-symbols-outlined">chevron_right</span>
    </button>
  </div>
</div>
