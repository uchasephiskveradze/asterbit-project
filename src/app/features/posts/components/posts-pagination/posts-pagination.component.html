<div class="posts-pagination">
  @let page = currentPage();
  @let pages = totalPages();

  <span class="posts-pagination__summary">
    Showing {{ rangeStart() }} to {{ rangeEnd() }} of {{ totalItems() }} posts
  </span>

  <div class="posts-pagination__controls">
    <button
      type="button"
      class="posts-pagination__nav"
      [disabled]="page <= 1"
      (click)="pageChange.emit(page - 1)"
      aria-label="Previous page"
    >
      <span class="material-symbols-outlined">chevron_left</span>
    </button>

    @for (visiblePage of visiblePages(); track visiblePage) {
      @if (visiblePage === 'ellipsis') {
        <span class="posts-pagination__ellipsis">...</span>
      } @else {
        <button
          type="button"
          class="posts-pagination__page"
          [class.posts-pagination__page--active]="visiblePage === page"
          (click)="pageChange.emit(visiblePage)"
        >
          {{ visiblePage }}
        </button>
      }
    }

    <button
      type="button"
      class="posts-pagination__nav"
      [disabled]="page >= pages"
      (click)="pageChange.emit(page + 1)"
      aria-label="Next page"
    >
      <span class="material-symbols-outlined">chevron_right</span>
    </button>
  </div>
</div>
