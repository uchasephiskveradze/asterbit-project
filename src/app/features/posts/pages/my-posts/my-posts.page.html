<section class="my-posts-page">
  @let errorMessage = store.error();

  <app-page-header
    title="My Posts"
    subtitle="Track submissions under review, approved, and rejected."
  >
    <a class="my-posts-page__action" routerLink="/posts/new">
      <span class="material-symbols-outlined">add</span>
      New Post
    </a>
  </app-page-header>

  <nav class="my-posts-page__tabs" aria-label="Post status tabs">
    @for (tab of tabs; track tab) {
      @let isActiveTab = store.activeTab() === tab;

      <a
        class="my-posts-page__tab"
        [class.my-posts-page__tab--active]="isActiveTab"
        [routerLink]="['/posts/my']"
        [queryParams]="{ tab }"
        [attr.aria-current]="isActiveTab ? 'page' : null"
      >
        {{ tabLabels[tab] }}
      </a>
    }
  </nav>

  @if (store.loading()) {
    <app-posts-loading-state />
  } @else if (errorMessage) {
    <app-error-state [message]="errorMessage" (retry)="store.retry()" />
  } @else if (isEmpty()) {
    <app-empty-state
      title="No posts found"
      description="Your editorial calendar is currently empty. Get started by creating your first post to engage your audience."
    >
      <a routerLink="/posts/new">
        <span class="material-symbols-outlined">post_add</span>
        Create Post
      </a>
    </app-empty-state>
  } @else {
    <div class="my-posts-page__content">
      <app-posts-table
        [posts]="store.filteredPosts()"
        [showAdminActions]="false"
        [enableOwnerEdit]="showOwnerEdit()"
        [ownerId]="auth.currentUser()?.id ?? null"
        detailsFrom="my-posts"
        [detailsTab]="store.activeTab()"
      />
    </div>
  }
</section>
